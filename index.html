<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport — viewport-fit=cover prevents white bars on iPhone notch ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── PWA / Theme ─────────────────────────────────────────────────────── -->
    <meta name="theme-color" content="#1c7c45" />

    <!-- ── iOS Safari ──────────────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LoopGen" />

    <!-- ── Android / generic ───────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="LoopGen" />

    <!-- ── Icons ───────────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- ── Manifest — generated by vite-plugin-pwa at build time ───────────── -->
    <!-- DO NOT add a manual <link rel="manifest"> here.                        -->
    <!-- vite-plugin-pwa injects it automatically into the built index.html.    -->

    <!-- ── Windows tile ────────────────────────────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#1c7c45" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <title>LoopGen</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
